<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <header>
        <h1>Beginner-friendly HTML and CSS Quiz</h1>
    </header>
    <main>
        <form action="">
            <label><span>1. </span>What does the acronym CSS stand for?</label><br>
            <input type="text" name="q1" id="q1"><br>
            <label><span>2. </span>How are id and class attributes selected in CSS?</label><br>
            <textarea name="q2" id="q2" cols="30" rows="10"></textarea><br>
            <label><span>3. </span>Which of tag selector and class selector has higher priority?</label><br>
            <label>Tag selector: </label><input class="tag" type="checkbox" name="q3a" id="q3a"><br>
            <label>Class selector: </label><input class="class" type="checkbox" name="q3b" id="q3b"><br>
            <label><span>4. </span>Which of the following is a valid CSS comment?</label><br>
            <select name="q4" id="q4">
                <option value="" selected disabled>--Please choose an option--</option>
                <option value="javascript">// This is an invalid CSS comment because CSS does not support "//" for
                    comments.</option>
                <option value="python"># This is an invalid CSS comment because CSS does not use Python-style comments.
                </option>
                <option value="css">/* This is a valid CSS comment to describe the purpose of the following styles */
                </option>
            </select><br>
            <label><span>5. </span>What is the bottom margin given this declaration?</label><br>
            <label class="bottom">margin: 10px 5px 15px;</label><br>
            <input type="number" name="q5" id="q5"><br><br>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
    <footer></footer>
</body>

</html>
